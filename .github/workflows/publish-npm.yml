name: Publish npm package

on:
  push:
    tags:
      - "config-runtime-v*"
      - "guard-cli-v*"
      - "transport-http-v*"
      - "cli-http-v*"
  workflow_dispatch:
    inputs:
      publish_config_runtime:
        description: "Publish @caprail/config-runtime"
        required: false
        type: boolean
        default: true
      publish_guard_cli:
        description: "Publish @caprail/guard-cli"
        required: false
        type: boolean
        default: true
      publish_transport_argv:
        description: "Publish @caprail/transport-argv"
        required: false
        type: boolean
        default: true
      publish_transport_http:
        description: "Publish @caprail/transport-http"
        required: false
        type: boolean
        default: true
      publish_cli_argv:
        description: "Publish @caprail/cli-argv"
        required: false
        type: boolean
        default: true
      publish_cli_http:
        description: "Publish @caprail/cli-http"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish_from_tag:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: npm test --workspaces

      - name: Resolve package from tag
        id: target
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"

          case "${TAG_NAME}" in
            config-runtime-v*)
              echo "package_path=packages/shared/config-runtime" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=config-runtime-v" >> "$GITHUB_OUTPUT"
              ;;
            guard-cli-v*)
              echo "package_path=packages/guards/cli" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=guard-cli-v" >> "$GITHUB_OUTPUT"
              ;;
            transport-http-v*)
              echo "package_path=packages/transports/http" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=transport-http-v" >> "$GITHUB_OUTPUT"
              ;;
            cli-http-v*)
              echo "package_path=packages/products/cli-http" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=cli-http-v" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release tag '${TAG_NAME}'" >&2
              exit 1
              ;;
          esac

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          PACKAGE_PATH="${{ steps.target.outputs.package_path }}"
          PACKAGE_JSON="${PACKAGE_PATH}/package.json"

          echo "name=$(node -p "require('./${PACKAGE_JSON}').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./${PACKAGE_JSON}').version")" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        shell: bash
        run: |
          EXPECTED_TAG="${{ steps.target.outputs.tag_prefix }}${{ steps.package.outputs.version }}"
          ACTUAL_TAG="${GITHUB_REF_NAME}"

          if [ "${ACTUAL_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "Tag ${ACTUAL_TAG} does not match expected ${EXPECTED_TAG} for ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" >&2
            exit 1
          fi

      - name: Check whether version already exists on npm
        id: npm_version
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version already exists on npm; publish step will be skipped."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm via trusted publishing
        if: ${{ steps.npm_version.outputs.exists != 'true' }}
        run: npm publish --workspace "${{ steps.target.outputs.package_path }}" --access public --provenance

      - name: Note skipped npm publish
        if: ${{ steps.npm_version.outputs.exists == 'true' }}
        shell: bash
        run: echo "Skipping npm publish because ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists."

  publish_from_dispatch:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: npm test --workspaces

      - name: Publish selected packages in dependency order
        shell: bash
        env:
          PUBLISH_CONFIG_RUNTIME: ${{ inputs.publish_config_runtime }}
          PUBLISH_GUARD_CLI: ${{ inputs.publish_guard_cli }}
          PUBLISH_TRANSPORT_ARGV: ${{ inputs.publish_transport_argv }}
          PUBLISH_TRANSPORT_HTTP: ${{ inputs.publish_transport_http }}
          PUBLISH_CLI_ARGV: ${{ inputs.publish_cli_argv }}
          PUBLISH_CLI_HTTP: ${{ inputs.publish_cli_http }}
        run: |
          set -euo pipefail

          declare -a SELECTED_PATHS=()

          if [ "${PUBLISH_CONFIG_RUNTIME}" = "true" ]; then
            SELECTED_PATHS+=("packages/shared/config-runtime")
          fi

          if [ "${PUBLISH_GUARD_CLI}" = "true" ]; then
            SELECTED_PATHS+=("packages/guards/cli")
          fi

          if [ "${PUBLISH_TRANSPORT_ARGV}" = "true" ]; then
            SELECTED_PATHS+=("packages/transports/argv")
          fi

          if [ "${PUBLISH_TRANSPORT_HTTP}" = "true" ]; then
            SELECTED_PATHS+=("packages/transports/http")
          fi

          if [ "${PUBLISH_CLI_ARGV}" = "true" ]; then
            SELECTED_PATHS+=("packages/products/cli-argv")
          fi

          if [ "${PUBLISH_CLI_HTTP}" = "true" ]; then
            SELECTED_PATHS+=("packages/products/cli-http")
          fi

          if [ "${#SELECTED_PATHS[@]}" -eq 0 ]; then
            echo "No packages selected. Nothing to publish."
            exit 0
          fi

          echo "Selected package paths:"
          for PACKAGE_PATH in "${SELECTED_PATHS[@]}"; do
            echo "- ${PACKAGE_PATH}"
          done

          for PACKAGE_PATH in "${SELECTED_PATHS[@]}"; do
            PACKAGE_JSON="${PACKAGE_PATH}/package.json"
            PACKAGE_NAME="$(node -p "require('./${PACKAGE_JSON}').name")"
            PACKAGE_VERSION="$(node -p "require('./${PACKAGE_JSON}').version")"

            echo "Evaluating ${PACKAGE_NAME}@${PACKAGE_VERSION}"

            if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "Skipping ${PACKAGE_NAME}@${PACKAGE_VERSION}; version already exists on npm."
              continue
            fi

            echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION}"
            npm publish --workspace "${PACKAGE_PATH}" --access public --provenance
          done
