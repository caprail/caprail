name: Publish npm packages

on:
  push:
    branches:
      - main
    paths:
      - "packages/**/package.json"
      - ".github/workflows/publish-npm.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changed.outputs.matrix }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: npm test --workspaces

      - name: Detect packages with version changes
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');

          const packages = [
            'packages/shared/config-runtime',
            'packages/guards/cli',
            'packages/transports/argv',
            'packages/transports/http',
            'packages/products/cli-argv',
            'packages/products/cli-http'
          ];

          const outputPath = process.env.GITHUB_OUTPUT;
          const beforeSha = process.env.BEFORE_SHA;

          const readAtRef = (ref, filePath) => {
            try {
              return execSync(`git show ${ref}:${filePath}`, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] });
            } catch {
              return null;
            }
          };

          const changed = [];

          for (const pkgPath of packages) {
            const manifestPath = `${pkgPath}/package.json`;
            const headPkg = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            const baseRaw = beforeSha ? readAtRef(beforeSha, manifestPath) : null;
            const basePkg = baseRaw ? JSON.parse(baseRaw) : null;
            const baseVersion = basePkg?.version;
            const headVersion = headPkg.version;

            if (!baseVersion || baseVersion !== headVersion) {
              changed.push({
                path: pkgPath,
                name: headPkg.name,
                version: headVersion
              });
            }
          }

          const hasChanges = changed.length > 0;
          fs.appendFileSync(outputPath, `matrix=${JSON.stringify({ include: changed })}\n`);
          fs.appendFileSync(outputPath, `has_changes=${hasChanges}\n`);

          if (!hasChanges) {
            console.log('No package version changes detected.');
          } else {
            for (const pkg of changed) {
              console.log(`Will publish ${pkg.name}@${pkg.version}`);
            }
          }
          "

  publish:
    needs: prepare
    if: ${{ needs.prepare.outputs.has_changes == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish ${{ matrix.name }}@${{ matrix.version }}
        run: npm publish --workspace "${{ matrix.path }}" --access public --provenance
